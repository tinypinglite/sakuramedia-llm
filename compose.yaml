services:
  asr-cpu:
    profiles: ["cpu"]
    image: sakuramedia-llm:cpu
    build:
      context: .
      target: cpu
    ports:
      - "8000:8000"
    environment:
      - SAKURA_API_KEY=${SAKURA_API_KEY:?SAKURA_API_KEY is required}
      - SAKURA_RUNTIME_DEVICE_POLICY=cpu
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models

  asr-cuda:
    profiles: ["cuda"]
    image: sakuramedia-llm:cuda
    build:
      context: .
      target: cuda
    runtime: nvidia
    environment:
      - SAKURA_API_KEY=${SAKURA_API_KEY:?SAKURA_API_KEY is required}
      - SAKURA_RUNTIME_DEVICE_POLICY=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
