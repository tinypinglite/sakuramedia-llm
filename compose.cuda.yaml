services:
  asr:
    image: sakuramedia-llm:cuda
    build:
      context: .
      target: cuda
    runtime: nvidia
    environment:
      - SAKURA_API_KEY=${SAKURA_API_KEY:?SAKURA_API_KEY is required}
      # CUDA 文件固定走 cuda 策略，缺少 GPU 时应直接失败。
      - SAKURA_RUNTIME_DEVICE_POLICY=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
